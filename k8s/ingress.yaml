apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: modelship-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: modelship.local
    http:
      paths: 
      - path: /
        pathType: Prefix
        backend:
          service:
            name: modelship-service
            port:
              number: 8000  