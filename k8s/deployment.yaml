apiVersion: apps/v1
kind: Deployment
metadata:
  name: modelship-api
  labels:
    app: modelship-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: modelship-api
  
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: modelship-api
    spec:
      containers:
        - name: modelship-api
          image: modelship:latest
          ports:
            - containerPort: 8000
          imagePullPolicy: IfNotPresent

          
          env:
          - name: MLFLOW_TRACKING_URI
            valueFrom:
              configMapKeyRef:
                name: modelship-config
                key: MLFLOW_TRACKING_URI
          startupProbe:
            httpGet:
              path: /readyz
              port: 8000
            failureThreshold: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            periodSeconds: 15
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
      



    

